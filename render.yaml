services:
  - type: web
    name: latex-tool-api
    runtime: python
    plan: standard
    region: oregon
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      pip install -r src/orchestration/requirements.txt &&
      pip install -r src/app/requirements.txt
    preDeployCommand: bash scripts/init_postgres_db.sh
    startCommand: python -m uvicorn src.app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: web
    name: latex-tool-app
    runtime: python
    plan: standard
    region: oregon
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      pip install -r src/app/requirements.txt
    startCommand: streamlit run src/app/streamlit_app.py --server.port=$PORT --server.address=0.0.0.0
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: API_URL
        value: https://latex-tool-api.onrender.com

databases:
  - name: recruitment-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "15"
    databaseName: recruitment_assistant
    ipAllowList: []
