name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  migrate-db:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install PostgreSQL migration dependency
      run: |
        python -m pip install --upgrade pip
        python -m pip install "psycopg[binary]==3.2.9"

    - name: Apply initial PostgreSQL schema
      env:
        POSTGRES_DSN: ${{ secrets.RENDER_POSTGRES_DSN }}
      run: bash scripts/init_postgres_db.sh

  deploy:
    runs-on: ubuntu-latest
    needs: migrate-db

    steps:
    - uses: actions/checkout@v4

    - name: Deploy API to Render
      run: |
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID_API }} \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

    - name: Deploy App to Render
      run: |
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID_APP }} \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

    - name: Optional SQLite to PostgreSQL mirror
      if: ${{ secrets.RENDER_POSTGRES_DSN != '' && vars.RENDER_RUN_SQLITE_MIRROR == 'true' }}
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
        POSTGRES_DSN=${{ secrets.RENDER_POSTGRES_DSN }} bash scripts/mirror_sqlite_to_postgres.sh

    - name: Wait for deployment
      run: |
        sleep 30
        curl -f https://${{ secrets.RENDER_SERVICE_URL_API }}/api/health || exit 1
        curl -f https://${{ secrets.RENDER_SERVICE_URL_APP }}/_stcore/health || exit 1

    - name: Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Render deployment ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment Status:* ${{ job.status }}\n*Branch:* main\n*Commit:* ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
