name: Tests CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Lint with pylint
        run: |
          pylint src/ --exit-zero --fail-under=7.0 || true
        continue-on-error: true

      - name: Check formatting with black
        run: |
          black --check src/ tests/ || true
        continue-on-error: true

      - name: Check import order with isort
        run: |
          isort --check-only src/ tests/ || true
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy src/ --ignore-missing-imports || true
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest tests/src_test \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junit-xml=test-results.xml \
            -v
        id: test_run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

      - name: Report test results
        if: always()
        run: |
          echo "Test run completed for Python ${{ matrix.python-version }}"
          if [ -f test-results.xml ]; then
            echo "✓ Test results saved at test-results.xml"
          fi
          if [ -f coverage.xml ]; then
            echo "✓ Coverage report saved at coverage.xml"
          fi

  summary:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Publish test results
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la test-results-*/ 2>/dev/null && echo "✓ Test results available" >> $GITHUB_STEP_SUMMARY || true
          ls -la coverage-report-*/ 2>/dev/null && echo "✓ Coverage reports available" >> $GITHUB_STEP_SUMMARY || true

      - name: CI Status
        if: success()
        run: echo "✅ All CI checks passed!"

      - name: CI Failed
        if: failure()
        run: echo "❌ Some CI checks failed. Review artifacts and logs."
