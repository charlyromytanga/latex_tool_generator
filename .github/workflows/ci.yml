name: CI - Test & Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.12' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: |
        pip install uv

    - name: Create virtual environment
      run: |
        uv venv

    - name: Sync dependencies
      run: |
        source .venv/bin/activate
        uv sync --dev

    - name: Lint with pylint (errors only)
      run: |
        source .venv/bin/activate
        pylint src/ --disable=all --enable=E,F --exit-zero || true

    - name: Format check with black
      run: |
        source .venv/bin/activate
        black src/ tests/ --check || true

    - name: Run unit tests
      run: |
        source .venv/bin/activate
        pytest tests/ -v --tb=short

    - name: Generate coverage report
      run: |
        source .venv/bin/activate
        pytest tests/ --cov=src --cov-report=xml --cov-report=term || true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (API)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.api
        push: false
        tags: latex-tool-gen:api-latest

    - name: Build Docker image (App)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.app
        push: false
        tags: latex-tool-gen:app-latest

    - name: Build Docker image (Runner)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.runner
        push: false
        tags: latex-tool-gen:runner-latest
