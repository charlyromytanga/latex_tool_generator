name: CI

on:
  push:
    branches: [ develop, dev_ats_offers ]
  pull_request:
    branches: [ develop, dev_ats_offers ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync
      - name: Lint
        run: |
          pip install flake8
          flake8 src/
      - name: Run tests
        run: |
          pip install pytest
          pytest
