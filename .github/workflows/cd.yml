name: CD

on:
  push:
    branches: [ develop, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t api-service .
      - name: Build Streamlit Docker image
        run: docker build -f Dockerfile.streamlit -t streamlit-frontend .
      # Ajoute ici tes étapes de déploiement (push, SSH, etc.)
