[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
# Run with: pytest --cov=src --cov-report=html
# To generate coverage report in htmlcov/ directory

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, uses external services)
    slow: Slow running tests
    api: API-related tests
    streamlit: Streamlit UI tests
    orchestration: Orchestration logic tests
    channels: Output channel tests
    cvrepo: CVRepo module tests
    database: Database-related tests
    error_handling: Error handling tests

# Asyncio mode
asyncio_mode = auto
