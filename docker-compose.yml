
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: api-service:latest
    ports:
      - "8000:8000"
    depends_on:
      - worker
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: streamlit-frontend:latest
    ports:
      - "8501:8501"
    depends_on:
      - api
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: worker-service:latest
    # Pas de port exposé, worker asynchrone
    depends_on:
      - api
