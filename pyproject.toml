[project]
name = "latex-tool-generator"
version = "0.2.0"
description = "Plateforme de génération intelligente de documents de candidature (CV, lettres, etc.) orchestrée par IA."
authors = [
    { name = "Cytech", email = "dev@cytech.local" }
]
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
keywords = ["cv", "streamlit", "fastapi", "orchestration", "llm", "latex"]

dependencies = [
    "python-dotenv>=1.0.0",
    "pydantic>=2.5.3",
    "pydantic-settings>=2.1.0",
    "sqlalchemy>=2.0.23",
    "psycopg[binary]>=3.2.9",
    "requests>=2.31.0",
    "httpx>=0.25.2",
    "aiohttp>=3.9.1",
    "tenacity>=8.2.3",
    "python-dateutil>=2.8.2",
    "pytz>=2023.3",
    "python-json-logger>=2.0.7",
    "prometheus-client>=0.19.0",
    "streamlit>=1.32.0",
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0"
]

[project.optional-dependencies]
api = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0"
]
app = [
    "streamlit>=1.32.0"
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"